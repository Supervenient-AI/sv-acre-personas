<script>
const DOCS = [{"id": "about", "group": "About", "name": "ACRE Personas", "subtitle": "The framework", "markdown": "# ACRE Personas\n### A persona framework for products that live between people\n\n---\n\n## Why standard personas don't work for us\n\nClassical UX personas assume the **individual** is the unit of value: one user, one set of goals, one journey. Our product's unit of value is the **collaboration itself** — the connective tissue between people who work together but don't work *for* the same organisation. Describing our users one at a time is like describing a single neuron and hoping to capture a thought.\n\nThe teams we serve are fragmented by design: a small brand, two agencies, a couple of freelancers, all converging temporarily on a shared deliverable. The thing we need to understand — and design for — is the *configuration*, not the individuals. Individuals are substitutable; the pattern of collaboration is not.\n\nACRE personas model users at four layers: **Account → Constellation → Role → Edge.**\n\n---\n\n## The four layers\n\n### A — Account\nThe organisational layer, borrowed from Account-Based Marketing. Not just firmographics (size, sector, revenue) but **collaboration posture**: how much of this organisation's work crosses its own boundary, how networked its delivery model is, how fragmented its tooling, and who pays the price when coordination fails. A four-person challenger brand that outsources all creative is a different organism from a 30-person architecture practice with rotating consultant engineers — even if both are \"UK professional services SMBs.\"\n\n*The Account is who buys.*\n\n### C — Constellation\nThe core innovation, and the layer where most design decisions get made. A Constellation persona describes a **recurring configuration of collaboration**:\n\n- The cast of roles involved (not named individuals — roles)\n- The topology: hub-and-spoke around a founder? Agency-led chain? Peer mesh?\n- The cadence and channels of communication\n- The dominant **boundary objects** — the shared artefacts (mockups, dielines, copy decks, briefs) through which the parties actually coordinate, and where translation between specialisms breaks down\n- Where **articulation work** concentrates — who is informally carrying the burden of \"who's doing what, by when, in what order\"\n- The characteristic failure modes\n- The **conflicting interests**. This is essential: the parties in a constellation do not share one goal. The agency wants scope protection; the freelancer wants prompt payment and creative credit; the founder wants speed. The tension *is* the persona. If a Constellation document reads like one big happy individual, it isn't modelling the thing our product exists to mediate.\n\nA Constellation survives the substitution of any individual member. Swap the illustrator and it is still the same Constellation.\n\n*The Constellation is what we design for.*\n\n### R — Role\nIndividuals, but defined **positionally** rather than demographically. We care less about a freelancer's age, goals and favourite apps than about her position in the network: peripheral, paid per deliverable, excluded from most communication channels, conscripted into our product by someone else's purchasing decision, and rightly suspicious of anything that smells like surveillance or unpaid admin. Role personas tell us what the product must feel like *from each seat* in the constellation — especially the seats that never chose us.\n\n*Roles are who we must not alienate.*\n\n### E — Edge\nProperties of the **relationships**, not the people: trust level, contractual basis, communication channel, shared history, information asymmetry. Two identical constellations behave completely differently if the brand–agency edge is \"five years of trust\" versus \"first engagement, fixed fee, nervous.\" Standard persona methods have nowhere to put this information. Ours must, because our AI literally sits on the edges — and because the AI is itself a participant, the human–AI edges need modelling too. The founder may treat the AI as a chief of staff; the freelancer may initially see it as the client's monitoring tool. Both are edges, and both shape behaviour.\n\n*Edges are what the AI must navigate — and may eventually become our permissions model.*\n\n---\n\n## How ACRE personas are created\n\nThe research unit is the **project**, not the company and not the individual.\n\n1. **Select 8–12 real projects** across our wedge verticals.\n2. **Map each constellation**: who is involved, employed by whom, communicating through what, around which boundary objects, and where things broke.\n3. **Interview multiple members of the same constellation.** The most valuable data is the *disagreement* — where the founder's account of the project diverges from the illustrator's is exactly where the product lives.\n4. **Cluster at the constellation level.** Expect a small number of recurring topologies (founder-hub, agency-led, peer mesh, relay chain) that cut across verticals. A marketing project and an interior design fit-out may be the same Constellation wearing different clothes — which tells us whether we're building for verticals or for topologies.\n\n---\n\n## How we use them\n\n- **Design decisions key to Constellations.** \"What does the AI surface, to whom, when?\" is unanswerable at the individual level. A founder-hub constellation needs the AI to relieve the hub; a peer mesh needs it to maintain shared state.\n- **Asymmetric onboarding.** One party adopts; everyone else is conscripted. Role personas define what conscription must feel like from each seat, and Edge attributes tell us how much trust capital each invitation can draw on.\n- **Pricing and GTM map to layers.** We sell to the Account, design for the Constellation, and must not alienate the Roles at the periphery. The constellation *is* our buying committee.\n- **AI behaviour tuning.** Edge attributes become product configuration over time: how formal the AI is across a low-trust contractual edge, what it may share across which boundaries.\n\n---\n\n*One-line summary: ACRE personas describe who buys (Account), the pattern we design for (Constellation), the seats we must win over (Roles), and the relationships our AI must navigate (Edges).*"}, {"id": "draft/wildfen/acre-persona.md", "group": "Draft", "name": "ACRE Persona 1 — The Founder-Hub Creative Sprint", "subtitle": "draft/wildfen", "markdown": "# ACRE Persona 1 — The Founder-Hub Creative Sprint\n### Wildfen Oat Co. — packaging redesign, 10-week sprint to a Sainsbury's listing deadline\n\n---\n\n## A — Account\n\n**Archetype:** The Outsourced-Everything Challenger Brand\n**Instance:** Wildfen Oat Co., founded 2022, based in a shared unit in Hackney Wick, London. Four employees: founder, ops manager, sales lead, marketing exec. Turnover ~£1.1m, not yet profitable. Stocked in independents and Ocado; the Sainsbury's listing is the company-maker.\n\n| Attribute | Description |\n|---|---|\n| Collaboration posture | Radically networked: all creative, production and specialist work crosses the company boundary. The packaging \"team\" is mostly not employees. |\n| Tooling | Internally WhatsApp + Google Workspace + a Notion nobody updates. Externally: whatever each supplier prefers. No shared system of record — the system of record is Priya's brain. |\n| Who carries coordination cost | The founder. Unbudgeted, invisible, done between 9pm and midnight. |\n| Buying behaviour | Founder is champion and economic buyer in one. Bought three SaaS tools this year on a free trial at 11pm; churned from two. Value must be felt within *this* project. |\n| What failure costs | A missed print deadline = a missed Sainsbury's launch window = a quarter's revenue and a bruised buyer relationship. Coordination failure is existential. |\n\n---\n\n## C — Constellation\n\n**Definition:** A small brand-side hub coordinating 3–6 external specialists toward a single creative deliverable with a hard external deadline.\n\n**Cast:**\n- **Priya Shah, 34** — Wildfen founder, the Hub (London)\n- **Sophie Okafor, 41** — account director, Marrow & Co branding agency (Leeds)\n- **Dave Hartley, 53** — production director, Calverton Print Group (Nottingham)\n- **Mara Kovač, 28** — freelance illustrator (Glasgow)\n- **Ben Whitford, 46** — freelance copywriter (Margate)\n\n**Topology:** Hub-and-spoke. Nearly everything routes through Priya. Mara and Dave have never spoken; Mara won't learn Calverton's print constraints exist until her artwork bounces off preflight in week six — unless something changes.\n\n**Cadence:** Bursty. Quiet stretches, then deadline panics. Priya's \"Monday status email\" is out of date by Wednesday. The biggest source of delay is decision latency at the hub: Priya is at a trade show in Amsterdam in week 3 and mid-fundraise throughout.\n\n**Boundary objects:** The packaging mockup (composition to Mara, brand equity to Sophie, dielines and tolerances to Dave, shelf-impact to Priya); the brand guidelines (a 60-page PDF Sophie's studio made in 2023 that Mara has skimmed); the copy deck; the dieline template; and the brief itself — which exists in four subtly different remembered versions.\n\n**Where articulation work concentrates:** On Priya, the least qualified translator between specialisms and the busiest person in the constellation. Secondary articulation falls on Sophie, who is quietly doing unpaid project management for freelancers she didn't choose, and it's starting to show in her tone.\n\n**Characteristic failure modes:**\n1. Version chaos at the hub (`wildfen_carton_v7_FINAL_print2.pdf`)\n2. Late discovery of cross-specialism constraints (illustration ↔ dieline ↔ copy length)\n3. Decision bottleneck when Priya goes quiet\n4. The \"two briefs\" problem — Marrow & Co and the freelancers working from divergent understandings\n5. Blame ambiguity when deadlines slip, straining edges that must survive into the next project\n\n**Conflicting interests:**\n- Priya wants speed and certainty, and treats every revision as free\n- Sophie wants scope protection and creative control; sees freelance artwork as a quality risk to \"her\" brand\n- Dave wants frozen artwork early; Calverton's margin comes from late change orders\n- Mara wants creative credit, prompt payment, and not to carry the can for specs nobody gave her\n- Ben wants the strategy context he's been excluded from, and sign-off that stays signed off\n\n**What this constellation needs from the AI:** Relieve Priya. Hold a single live state of the deliverable. Surface Dave's constraints to Mara in week one, not week six. Chase decisions without anyone nagging. Make handoffs explicit. Never make the spokes feel watched.\n\n---\n\n## R — Roles\n\n### Priya Shah, 34 — Founder, Wildfen Oat Co. *(The Brand Hub)*\n**London (Hackney Wick unit; lives in Walthamstow).** Ex-brand manager at a big FMCG company; left in 2022 because she was tired of decks about decks. Works from the unit, a coffee shop, and the 38 bus. Phone-first: WhatsApp voice notes are her native format, sent at 11.40pm with \"no rush!\" Has 14 apps with notifications on and trusts none of them; trusts her own memory, which is now visibly failing under load. **Attitude to AI:** enthusiastic, over-trusting; already uses a chatbot to draft investor emails. Danger: she'll happily let the AI make calls the spokes expect from a human. **Winning her looks like:** she gets an evening back in week two and tells another founder about it at a trade show.\n\n### Sophie Okafor, 41 — Account Director, Marrow & Co *(The Shadow Coordinator)*\n**Leeds.** Eighteen years agency-side; has survived three rebrands of her own agency. Runs her life in Basecamp and colour-coded Google Sheets; allergic to clients' tool whims (\"we are not moving platforms for a £30k account\"). Professionally warm, privately keeping a tally of the unpaid PM hours she spends chasing Priya's freelancers. Working hours strictly 9–5.30 — and she notices, with an edge, that Priya doesn't respect them. **Attitude to AI:** sceptical-professional. Has seen \"game-changing\" tools come and go. Will test within a week whether the AI respects Marrow's process or flattens it. **Winning her looks like:** the unpaid coordination disappears from her week while the agency's ownership of the creative relationship stays visibly intact.\n\n### Dave Hartley, 53 — Production Director, Calverton Print Group *(The Constraint-Holder)*\n**Nottingham.** Thirty years in print; can tell a coated stock by touch. Email only — prints PDFs to mark them up with an actual pen, scans them back in. Replies within the hour, 7.30am–4pm, never after. Joins projects late by industry convention and is privately exasperated by it: \"every job, same surprises.\" Speaks in tolerances, lead times and dieline gospel. **Attitude to AI:** none, until it saves him a reprint — then evangelical in his own gruff way. Dave-the-craftsman wants constraints surfaced early; Calverton-the-business profits when they surface late. The champion inside this spoke is Dave, not his firm. **Winning him looks like:** the artwork passes preflight first time and nobody rings him in a panic.\n\n### Mara Kovač, 28 — Freelance Illustrator *(The Conscripted Periphery)*\n**Glasgow (Dennistoun).** Glasgow School of Art, 2019. Works in Procreate on an iPad, often 2pm to midnight; juggles four clients and a personal zine. Found by Priya via Instagram; their entire relationship lives in WhatsApp and a Drive folder called \"WILDFEN ASSETS final\". Has been burned before: a client once blamed her for a print failure caused by specs she was never sent, and she ate the reprint cost. Invoices politely, twice. **Attitude to AI:** wary-by-position. Her first contact with the product is an invitation she didn't ask for, from the person who controls her payment. Anything that smells like time-tracking, surveillance or unpaid admin and she'll engage exactly as much as contractually unavoidable. **Winning her looks like:** she gets the dieline and print specs in week one without asking, gives feedback by annotating visuals instead of writing paragraphs, and the product costs her less effort than the email threads it replaced — from message one.\n\n### Ben Whitford, 46 — Freelance Copywriter *(The Information-Starved Repeat Player)*\n**Margate.** Twenty years in London agencies; went freelance and coastal in 2020. Writes in Google Docs with version names like \"carton copy v3 — THE GOOD ONE\". The constellation's institutional memory for tone of voice — Priya relies on this and doesn't credit it. Working pattern: deep mornings, swims at lunch, light afternoons. Wry in comments; diplomatically furious when copy he wrote to a 40-word limit meets a dieline that fits 22. **Attitude to AI:** intrigued but territorial — fine with it *routing* his words, watchful for it *rewriting* them. **Winning him looks like:** he sees the strategy, the illustration-in-progress and the dieline before he writes, and sign-off, once given, stays given.\n\n---\n\n## E — Edges\n\n| Edge | Contract | Trust | Channel | Key asymmetry / note |\n|---|---|---|---|---|\n| Priya ↔ Sophie | Retainer + project fees | 2 yrs, solid but budget-strained | Email + monthly call; Priya keeps trying WhatsApp, Sophie keeps not answering it | Sophie holds brand knowledge Priya can't articulate; Priya holds the budget |\n| Priya ↔ Dave | Per print run, PO-based | Second engagement, transactional | Email only | Dave knows constraints nobody asks about until too late |\n| Priya ↔ Mara | Per deliverable, no formal contract | Warm but new | WhatsApp + Drive | Payment power vs. creative dependency; the informality cuts both ways |\n| Priya ↔ Ben | Day rate | Repeat collaborator, 4 projects | Email + shared docs | Ben holds tone-of-voice memory Priya relies on but doesn't credit |\n| Sophie ↔ Mara | **None** | Low / wary; quality-control tension | Routed via Priya | The edge most likely to fail silently — Sophie's feedback reaches Mara third-hand and softened |\n| Sophie ↔ Dave | **None** | Professional but guarded | Routed via Priya | Each blames the other when artwork fails preflight |\n| Mara ↔ Dave | **None** | Don't know each other exist | — | The costliest missing edge in the constellation |\n| **Priya ↔ AI** | — | High, eager, over-trusting | In-product | Treats the AI as chief of staff; risk of delegated judgement calls the spokes expect from a human |\n| **Mara ↔ AI** | — | Low, defensive at first contact | In-product (conscripted) | Reads the AI as the client's monitoring tool until proven otherwise; the make-or-break adoption edge |\n| **Sophie ↔ AI** | — | Sceptical-professional | In-product | Testing whether it respects Marrow's process or flattens it |\n| **Dave ↔ AI** | — | Indifferent until proven useful | Email bridge | Won't adopt a new interface; the AI must meet him in his inbox |\n\n**Product needs from the edge map:**\n- The three edges that don't exist (Sophie↔Mara, Sophie↔Dave, Mara↔Dave) are where the costliest failures originate. The highest-value move is to give those missing edges a safe, low-friction channel without forcing relationships the parties haven't chosen.\n- The constellation spans four working-hour patterns (Priya's 11pm voice notes, Sophie's strict 9–5.30, Dave's 7.30–4, Mara's 2pm–midnight) and three native channels (WhatsApp, Basecamp/email, email-only). Any tool that demands synchronicity or a single channel has already failed four of the five people.\n- Dave will never open a dashboard. If the product can't act through email for him, the constellation has a hole in it."}, {"id": "draft/loop-theory/acre-persona.md", "group": "Draft", "name": "ACRE Persona 2 — The Agency-Led Account", "subtitle": "draft/loop-theory", "markdown": "# ACRE Persona 2 — The Agency-Led Account\n### Loop Theory — a 3-person growth marketing agency running a client account with rotating freelancers\n\n## A — Account\n**Archetype:** The Post-Contraction Boutique Agency. Loop Theory, growth/performance marketing, 3 full-time staff plus roughly the same again in freelancers (two regulars, a rotating cast behind them). Recently shrank from a bigger team; the founders now do client work *and* run the company. Google Workspace + Slack; paid Claude subscription shared informally; dashboarding tools are the biggest software outlay. Buying behaviour: will trial anything that promises to relieve the founders, but has been burned — they adopted a reporting-automation tool last year that got better, then worse, then quietly died, and the team had stopped using it before the vendor folded. They will test a new product hard and tell you exactly why it broke.\n\n## C — Constellation\n**Definition:** An agency hub running a continuous client account — not a one-off project — with freelancers attached per-workstream and a client contact who can summon attention at any moment.\n\n**Cast:** Agency founder (strategy + everything), second founder (delivery + content), account exec, two regular freelancers (paid media specialist, designer), client-side marketing manager, client-side finance contact (invoices only).\n\n**Topology:** Agency-led hub, but with a live wire to the client: the client's Slack/email reaches straight into the agency's day and detonates priorities. Freelancers hang off individual workstreams and rarely see the whole account.\n\n**Cadence:** Continuous, punctuated by the client's \"throwaway\" questions — quick to ask, expensive to answer, impossible to triage by urgency from the message alone.\n\n**Boundary objects:** The monthly performance report (numbers + written narrative), the media plan, the dashboard, the timesheet (a work of collective fiction completed three weeks late), the brief per workstream.\n\n**Failure modes:**\n1. Client comms triage — every message treated as urgent because nobody knows which ones are\n2. Each person disappearing into their own private AI chats; insight never returns to the team\n3. Freelancer onboarding repeated from scratch per workstream\n4. Resource whiplash: over-profitable with a burnt-out team, or comfortable and unprofitable — never level\n5. Timesheets reconstructed from memory, \"invariably wrong\"\n\n**Conflicting interests:** The client wants instant responsiveness; the founders want protected thinking time; the freelancers want clean briefs and to bill for the onboarding nobody scopes; the account exec absorbs the gap between all three.\n\n**What the constellation needs from the AI:** Sit *in Slack* as a contributor, not in a separate app. Triage inbound client requests (urgent / needs thinking / can hold). Hold account knowledge so freelancers onboard themselves. Estimate timesheets from observable activity and ask for a 5-second confirm — \"a quicker wrong is better than a slower wrong.\" Surface the resourcing picture before it becomes a crisis.\n\n## R — Roles\n**Marcus Bell, 41 — Founder (The Player-Manager).** Bristol; school-run hours, then a second shift at 9pm. Treats AI as \"a fairly experienced mid-tier colleague — brilliant but often stupid\": he'll delegate to it but interrogates every number. Wants the first 20% and last 20% of any deliverable to stay human, partly conviction, partly self-respect. Constantly slightly wrong about capacity. Has \"try Claude's new features\" on his list every week and never gets to it.\n**Leila Fontaine, 38 — Co-founder (The Delivery Engine).** London. Has quietly vibe-coded a booking tool for a side project; the pragmatic experimenter of the pair. Would let the AI draft, never let it send.\n**Jess Adeyemi, 26 — Account Exec (The Shock Absorber).** Remote, Sheffield. First responder to every client ping; decides forty times a day what's urgent with no information. The role that benefits most from triage and gets asked least.\n**Tom Rourke, 33 — Freelance Paid Media (The Repeat Spoke).** Leeds, three other clients. Sets up campaigns in Meta/Google — a time-slog of pure configuration. Bills by the day; unscoped onboarding and \"quick calls\" eat his margin. Wary of anything that watches how long things take him.\n**Client-side: Hannah Pryce, 35 — Marketing Manager (The Summoner).** Asks questions in Slack at 5.55pm that are either nothing or everything. Doesn't know which herself. Once rewrote the agency's long-form article in ChatGPT and sent it back \"improved\"; it wasn't, and saying so cost a week of diplomacy.\n\n## E — Edges\nThe defining edges: **Hannah ↔ agency** (high power asymmetry; the channel is hers, the cadence is hers, and the AI must moderate the flow without ever appearing to gatekeep the client); **Marcus ↔ Tom** (warm, repeat, but every engagement re-negotiates scope from scratch — the edge needs a persistent memory neither party maintains); **Marcus ↔ Leila** (founder edge: shared everything, including the unexamined assumption that the other one is tracking capacity); **team ↔ AI** (the team will trust it as a colleague precisely to the degree it admits what it doesn't know — they've watched one tool die of overpromising).\n\n*Grounded in: WeGrow interview (James S.), with the client-rewrites-the-copy incident from the Shift7 interview.*\n"}, {"id": "draft/halyard-vance/acre-persona.md", "group": "Draft", "name": "ACRE Persona 3 — The Conscripted Spoke", "subtitle": "draft/halyard-vance", "markdown": "# ACRE Persona 3 — The Conscripted Spoke\n### Halyard & Vance — a 2-person PR consultancy living inside its clients' constellations\n\n## A — Account\n**Archetype:** The Micro-Consultancy as Periphery. Two co-founders — one PR, one sales — who left agency leadership roles to splice the two disciplines, plus one overflow freelancer used a couple of days a month. Macs, Microsoft 365 (chosen because clients live in Teams), Google Drive for storage, ChatGPT business. Five clients, five invoices, no finance team. The critical fact: **this account is almost never the hub.** In every engagement, Halyard & Vance is a spoke in someone else's constellation, conscripted into each client's channel of choice — Teams for one, Slack for another, WhatsApp for a third. Red lines: nothing touches the bank account; nothing exposes what people are paid.\n\n## C — Constellation\n**Definition:** A micro-supplier simultaneously embedded at the periphery of several client constellations, each with its own channel, cadence and culture — while running its own tiny business in the gaps.\n\n**Cast:** Two co-founders, one freelancer, and per-client: a marketing contact (day-to-day), a finance contact (invoices vanish here), occasionally a founder/CEO (opinions arrive from here).\n\n**Topology:** Inverted hub-and-spoke. The pair are spokes five times over; the only place all five engagements meet is in the founders' heads and a spreadsheet.\n\n**Boundary objects:** The article/press release (which the client may unilaterally \"improve\" with ChatGPT), the coverage report, the media list, the invoice — which enters the client's finance department like a coin into a vending machine that sometimes pays out.\n\n**Failure modes:**\n1. Channel fragmentation — five clients, four platforms, zero unified inbox; Slack \"never notifies you of what's going on\"\n2. Invoice-chasing loops: client contact → finance contact → silence → restart (\"the bane of my life\")\n3. Workslop flowing *downstream*: the client redoes agency work with AI and sends it back worse, with feelings now attached\n4. The founders proofreading and desk-researching at midnight because there's no junior to lean on\n5. Cash-flow blindness — money in, money out, and HMRC deadlines tracked on vigilance alone\n\n**Conflicting interests:** Each client wants the agency present in *their* channel at *their* cadence, as if exclusive; the founders need one consolidated view of everything; the freelancer wants the interesting work, not the update reports; client finance departments are structurally indifferent to the supplier's cash flow.\n\n**What the constellation needs from the AI:** Be the unified layer across channels the founders aren't allowed to choose. Chase invoices politely and persistently so a founder doesn't have to spend relationship capital doing it. Watch HMRC and cash-flow deadlines. Do the junior-staffer work — desk research on a journalist in seconds, proofing without rewriting (\"proof it, don't change it\" should not require a paragraph of instructions). Never touch the bank.\n\n## R — Roles\n**Nat Calloway, 41 — Co-founder, PR (The Five-Hatted).** Stockport. Ex-MD of a mid-size agency; knows exactly what good looks like and does it all herself now. Uses ChatGPT like the junior team she no longer has: proofing, media-contact research, sanity-checking contract clauses she's not qualified to read. Rates her AI enthusiasm \"3.5 to 4 — could live without it.\" Allergic to tools demanding upfront annual payment; was driven off a transcription app by exactly that.\n**Ash Devine, 43 — Co-founder, Sales (The Pipeline Half).** Brighton. Outlook loyalist (the reason they're on 365). Runs the new-business funnel on instinct and a spreadsheet.\n**Priti Rao, 36 — Freelance PR (The Overflow Valve).** Two days a month, more when it spikes. Sees fragments of accounts, never the whole; every brief arrives needing twenty minutes of context she has to ask for.\n**Client-side: Dominic Shaw, 48 — Founder of a B2B tech client (The Improver).** Pays promptly, interferes constantly, owns a ChatGPT subscription and the confidence to use it on the agency's copy.\n\n## E — Edges\nThe edges that matter: **Nat ↔ each client channel** (the AI must operate *inside* Teams, Slack and WhatsApp threads the agency doesn't control — a spoke can't impose tooling on a hub); **Nat ↔ client finance contacts** (low-warmth, high-stakes, purely transactional — the single best edge to automate because no relationship is at risk); **Nat ↔ Dominic** (the workslop edge: the AI's job is partly forensic — keeping a clean record of what the agency actually delivered versus what came back); **Nat ↔ Ash** (the founder edge again: two halves of one business with two different native tools).\n\n*Grounded in: Shift7 interview (Alex).*\n"}, {"id": "draft/harewood-frame/acre-persona.md", "group": "Draft", "name": "ACRE Persona 4 — The Principal Designer Mesh", "subtitle": "draft/harewood-frame", "markdown": "# ACRE Persona 4 — The Principal Designer Mesh\n### Harewood Frame Architects — a 70-person practice leading a multi-firm building project under regulatory accountability\n\n## A — Account\n**Archetype:** The Regulated Lead Consultant. Harewood Frame, ~70-person architecture practice, London. Microsoft 365 + Teams (transcription increasingly used, Copilot barely), plus a sector-specific AI platform chosen because it's siloed — nothing entered leaks to the cloud, satisfying GDPR and NDAs — and trained to speak architect. There is an AI working group, a stringent approval process, and two IT staff who review every tool's security before anyone may use it. Money is tight (\"cutting our cloth for the next six months\"), so existing tools get sweated before new ones get bought. What failure costs: post-Grenfell, under the Building Safety Act, the practice is *liable for what gets built*. Mistakes aren't embarrassing; they're litigable.\n\n## C — Constellation\n**Definition:** A multi-firm project team — architect as lead consultant and principal designer, external engineers, contractor, client — collaborating intensively across company boundaries that legally and contractually *must not dissolve*.\n\n**Cast:** Architect project lead, practice associate (on 2–7 projects simultaneously), external structural engineer (different firm), M&E consultant (different firm again), contractor's project manager, client's development lead. People rotate off the project for months and return; new joiners arrive mid-stream and take months to catch up despite hours of briefing.\n\n**Topology:** Peer mesh with a designated accountable node. Information flows many-to-many in meetings and email, but responsibility — including the **golden thread** of safety decisions (what was decided, by whom, when, and whether it changed) — concentrates on the architect, who maintains that record manually, separately, on top of the actual work.\n\n**Boundary objects:** Drawings and BIM models, the design access statement (thousands of words, weeks of writing), meeting minutes (hours-long meetings, 20 participants), the golden thread tracker, tender submissions, the brief.\n\n**Failure modes:**\n1. Decisions made verbally in meetings that never land in the golden thread\n2. Returners and new joiners operating on months-old project state\n3. Cross-firm constraint discovery arriving late (engineering reality meeting design intent)\n4. The practice's AI cannot be shared outside its boundary — so the *project's* collective knowledge has no home that everyone in the mesh can touch\n5. Business development starving: \"the thing you're supposed to do when you're busiest, because in three months you won't be\"\n\n**Conflicting interests:** The practice must record everything (liability) but cannot share its tools (confidentiality); the other firms have their own equivalents of the same bind; the contractor profits from variations the designers exist to prevent; the client wants speed through a process built for accountability.\n\n**What the constellation needs from the AI:** Project-scoped, not team-scoped. Live inside the practice's security perimeter while serving a cross-firm project: ingest minutes, emails and documents; generate the golden thread as a living record instead of a parallel chore; catch up returners and new joiners (\"here's what happened while you were away, here are the five documents that matter\"); draft the narrative-heavy submission text in the practice's voice for human curation — never the technical content, which must stay checked by accountable humans.\n\n## R — Roles\n**Alec Romer, 44 — Associate Director (The Power User).** Highbury. Top consumer of AI credits in the practice; built his own minute-taking agent and a tender-writing agent trained on three years of submissions; AI-drafted his last design access statement and saved weeks. Trained the model off em-dashes. Bursting with product ideas (a brochure-assembly engine, a building-regs expert); would build them himself if he could code, and knows it. Strategy is his weak spot and he knows that too — \"I can only focus on one thing at a time, and the micro detail wins.\"\n**Robbie Quinn, 36 — The In-House Champion.** Introduced every AI tool the practice uses; speaks at industry events about it; will trial anything. Your route in — and your single point of failure if he leaves.\n**Sandra Iles, 51 — IT & Security Lead (The Perimeter).** Reviews everything. Not hostile, just unhurried and unimpressible. The product conversation with Sandra is about data boundaries or it doesn't happen.\n**External: Tomas Verhoeven, 47 — Structural Engineer (The Peer Node).** Different firm, same project, own tools, own liability. Will join a shared project layer only if his firm's exposure is provably unchanged by it.\n**Client-side: Diane Okafor, 39 — Development Lead.** Wants dates. Reads minutes only when something has gone wrong.\n\n## E — Edges\nDefining edges: **practice ↔ external firms** (dense daily collaboration across a boundary that must stay legally crisp — the AI serves the project while respecting that every firm keeps its own perimeter); **Alec ↔ Sandra** (enthusiasm metered by governance: the internal edge every feature must survive); **Alec ↔ returning staff** (the catch-up edge — months of context transferred in hours); **practice ↔ contractor** (politely adversarial; the golden thread is partly a defence along this edge).\n\n*Grounded in: Jestico & Whiles interview (Alex L.), with the relationship-driven-laggard context from the Reef & Partners interview.*\n"}, {"id": "draft/calder-wealth/acre-persona.md", "group": "Draft", "name": "ACRE Persona 5 — The Regulated Satellite", "subtitle": "draft/calder-wealth", "markdown": "# ACRE Persona 5 — The Regulated Satellite\n### Calder Wealth Planning — a solo financial adviser and PA operating inside a national network's compliance perimeter\n\n## A — Account\n**Archetype:** The Franchise Satellite. A newly formed one-adviser practice (adviser + PA, second staff member arriving within months) operating under a large national wealth-management network. The network approves the software list: its own messaging app (encrypted docs, digital signatures), Salesforce, a cashflow-modelling platform, a client-portal product. Microsoft 365 sits underneath everything. The network has approved some AI (meeting transcription) and not yet others — which the practice quietly uses anyway, on the reasoning that the value is too large to wait: AI-drafted review letters take 10 minutes instead of an hour, across ~140 households. The risk calculus is personal: if it ever goes wrong, the network's reputation engine will land on the practice, hard.\n\n## C — Constellation\n**Definition:** A tiny regulated practice whose every project is a relay chain through institutions it doesn't control — the network above, product providers alongside, the client at the centre — with trust as the actual product.\n\n**Cast:** The adviser, the PA, the network's compliance function (faceless, decisive), product providers (pension and investment companies on the other end of letters of authority), and the client households.\n\n**Topology:** Satellite-and-relays. The practice orbits the network (which sets the rules and processes a cut of everything) while running horizontal relay chains to providers: client signs a letter of authority → adviser submits to provider → provider returns incomplete information → clarification round-trips → data lands in the practice's template → analysis → suitability letter. Weeks of latency, none of it value-adding.\n\n**Boundary objects:** The review letter (regulatorily required, written for a reader who mostly doesn't exist — perhaps 10 of 140 households read them), the letter of authority, the suitability report, the cashflow model, the meeting transcript.\n\n**Failure modes:**\n1. AI confabulation in client-facing documents — a review letter recently invented a child (\"Riley\") for a family with three differently-named daughters; sent unchecked, that destroys the only asset that matters\n2. The letters-of-authority relay: chase, receive partial data, chase again — drudgery that is \"no good for anybody\"\n3. Delegation failure: a founder used to doing everything, now needing the PA to absorb whole processes\n4. Tool schism: the network approves slowly; capability arrives quickly; the gap is where the practice quietly lives\n\n**Conflicting interests:** The network wants control and auditability; the adviser wants speed and his evenings; the PA wants real responsibility without becoming the one watched by monitoring software (\"I don't want my employees to feel like they're being watched\"); the providers are structurally indifferent to everyone's timelines; the client wants a human who knows their children's actual names.\n\n**What the constellation needs from the AI:** Run the relay chains — track every letter of authority, chase providers, flag what came back incomplete, assemble the data into the practice's templates. Draft review and suitability letters with a *verification layer* that surfaces every factual claim (names, figures, products) against source records before anything human-signs. Brief the PA into processes the adviser has never written down. Operate inside the approved perimeter — or be the product the network itself approves.\n\n## R — Roles\n**James Calder, 43 — Adviser & Founder (The Excel Romantic).** York. Ex-rail demand modeller; builds beautiful spreadsheets nobody asked for. The actual job is talking — making people comfortable with their financial lives — and he's clear-eyed that most clients never read the paperwork the regulator requires him to produce. Philosophy: AI makes employees more productive, it doesn't replace them. Currently teaching himself to delegate, which is going about as well as it usually does.\n**Sarah Whitlow, 34 — PA (The Process Owner-To-Be).** Poached from his previous firm; knows where everything is. About to inherit the letters-of-authority misery and would pay personally to have it automated. Will resent any tool that reads like time-tracking.\n**The Network (compliance function).** Not a person; a weather system. Approves tools on its own schedule; punishes incidents without appeal. Every product decision routes around or through it.\n**Provider-side: \"Aegon-equivalents\".** Institutional counterparties who respond in weeks, in PDFs, incompletely, by design of nobody in particular.\n\n## E — Edges\nDefining edges: **practice ↔ network** (asymmetric dependency; the practice's autonomy exists at the network's pleasure — product strategy may mean selling to the network, not the satellite); **adviser ↔ client** (high-trust, fully human, and the edge AI must never visibly touch: a clanger here is unrecoverable); **practice ↔ providers** (slow, formal, automatable with zero relationship risk — the single best ROI edge in the constellation); **James ↔ Sarah** (the delegation edge: the product can be the medium through which a founder finally hands processes over).\n\n*Grounded in: Bowcliffe Wealth / SJP interview (James St.).*\n"}, {"id": "draft/northbeam/acre-persona.md", "group": "Draft", "name": "ACRE Persona 6 — The Embedded Consultancy", "subtitle": "draft/northbeam", "markdown": "# ACRE Persona 6 — The Embedded Consultancy\n### Northbeam Advisory — consultants living inside their enterprise clients' environments\n\n## A — Account\n**Archetype:** The Two-Laptop Consultancy. Northbeam, ~45-person transformation consultancy, organised in client-aligned pillars so siloed that the team serving one enterprise never needs to speak to the team serving another. Consultants spend 1–2 days a week physically at client sites, carrying two laptops: their own and the client-issued one, each opening onto a different world (the client's Teams/stack vs Northbeam's own M365). Fully distributed otherwise — client offices, WeWorks, full-remote, Paris; one team day a month at a WeWork to remember each other's faces. Currently going through ISO accreditation including the new AI management standard, which has forced an audit of tool sprawl — and the audit was ugly: 100+ licences on one whiteboard platform from workshop guests added and never removed, redundant accounts everywhere, and at least one case of clients being able to see the firm's *entire* whiteboard estate.\n\n## C — Constellation\n**Definition:** A consultant pod embedded inside an enterprise client's environment — working in the client's tools, on the client's laptop, under the client's governance — while the consultancy tries to retain its own institutional knowledge and methods.\n\n**Cast:** Engagement lead, 2–4 consultants (embedded 1–2 days/week), the client's programme owner, the client's IT/security function (controls the environment the consultants work in), Northbeam's own ops/governance lead (fighting the licence hydra), and workshop participants who flow through shared tools in dozens.\n\n**Topology:** Pods embedded in foreign territory. Each pod lives mostly inside its client's perimeter; the consultancy's own knowledge layer is wherever fragments escape back to — which is the problem.\n\n**Boundary objects:** The workshop board (the single biggest leak surface), the deliverable deck, the client's own systems of record, and the consultancy's methods/IP — which exists to be reused across clients but keeps getting trapped inside individual client environments.\n\n**Failure modes:**\n1. Access sprawl: every workshop adds guests to shared tools; nobody removes them; governance discovers it years later at audit\n2. Cross-client leakage — the nightmare scenario in a firm whose clients are competitors-adjacent\n3. Knowledge fragmentation: what a consultant learns inside Client A's Teams never reaches the firm's collective memory\n4. Workslop and brain-fry: \"there's nothing worse than being presented the obviously-AI set of slides\" — quality erosion at exactly the layer clients are paying premium rates for\n5. Tool divergence: the firm's preferred AI tooling isn't accessible inside every client environment, so workflows can't standardise\n\n**Conflicting interests:** Client IT wants the consultants fully inside its perimeter; the consultancy needs knowledge to compound *across* clients; individual consultants optimise for whichever laptop is in front of them; governance wants a single source of truth that the embedded reality keeps shredding.\n\n**What the constellation needs from the AI:** Be the consultancy's own continuous layer that travels with the consultant across environments — a single source of truth on the firm's side, *piped into* each client environment (their Teams, their Salesforce) rather than replacing it. Manage the access lifecycle: who was added to what, for which workshop, and when they should be removed. Hold the firm's methods as reusable workflows. Keep an auditable line between client-confidential context and firm knowledge — which is also exactly what the ISO auditors want to see.\n\n## R — Roles\n**Katie Marsh, 42 — Engagement & Ops Lead (The Governance Conscience).** London, ex-startup operator; the person who discovered the 100 licences and now owns the cleanup. Has used vibe-coding tools for landing pages; fluent enough to be dangerous, senior enough to think commercially. Asks of any product: how does this fit the tools we already have, and what does it cost at scale — token anxiety is real.\n**Raj Patel, 35 — Senior Consultant (The Two-Laptop Life).** Reading; Tuesdays and Wednesdays at a banking client's office on their hardware, rest of the week everywhere. His best thinking is trapped in a client tenant he'll lose access to when the engagement ends.\n**Client-side: enterprise IT/security.** Not hostile, simply sovereign. The product enters this constellation on their terms or not at all.\n**Fiona Drummond, 51 — Northbeam Partner (The Pillar Owner).** Cares about utilisation, quality, and never appearing in a leakage incident report. Will sponsor anything that demonstrably reduces the third.\n\n## E — Edges\nDefining edges: **consultant ↔ client environment** (the consultant is a guest with two identities; the AI must follow the person across the boundary without smuggling data across it); **pod ↔ firm knowledge base** (the broken edge the product exists to repair); **firm ↔ workshop guests** (high-volume, short-lived access relationships that currently have no lifecycle — an edge type most tools don't even model); **Katie ↔ auditors** (governance as a feature: the edge map *is* the compliance evidence).\n\n*Grounded in: Katie Lewis interview, with workslop/brain-fry validation from the same conversation.*\n"}, {"id": "draft/bellhaven/acre-persona.md", "group": "Draft", "name": "ACRE Persona 7 — The Portfolio Hub", "subtitle": "draft/bellhaven", "markdown": "# ACRE Persona 7 — The Portfolio Hub\n### Bellhaven Capital — a 10-person investment fund coordinating reporting across an autonomous portfolio\n\n## A — Account\n**Archetype:** The Hub of Hubs. Bellhaven, a 10-person consumer-brands investment fund in Mayfair, sitting atop portfolio companies ranging from a 2,000-person global brand to a 27-person skincare house. Microsoft 365 + SharePoint (parts well-organised, the vast majority not), Zoom preference, Xero for the fund's own simple books. Copilot is on every laptop and used by almost no one; paid ChatGPT licences went to a couple of staff; the unofficial verdict was \"people prefer ChatGPT,\" so that's now quasi-policy. Tech-savviness: aspirational — they ran a senior-leadership AI roundtable with a big-name consultancy and everyone left asking \"but what do I actually do tomorrow?\" The real digital expertise lives out in the portfolio, and the fund borrows it.\n\n## C — Constellation\n**Definition:** A small centre with power but not operational authority, coordinating standardised information flows from autonomous companies that each have their own systems, formats and opinions.\n\n**Cast:** Fund CFO/finance lead, founder/principal (presents to the family/investors), junior analyst, and the portfolio CFOs — each running a different finance stack, a different chart of accounts, and a different definition of \"net sales.\"\n\n**Topology:** Hub-of-hubs. Each portfolio company is its own constellation; the fund's constellation is made of the *edges to those hubs*. Data flows inward monthly in incompatible formats; questions flow outward repetitively (\"why is this number up?\" — asked of the same line, by the same people, every quarter).\n\n**Boundary objects:** The reporting template (a unified, investor-level format that has been on someone's annual goals for three years and remains unbuilt — warehousing costs above the line at one company, below gross margin at another), the monthly management accounts, the LP/family presentation, the 150-page facility agreement someone needs one number out of.\n\n**Failure modes:**\n1. Garbage-in alignment: \"net sales\" means five different things; consolidation is re-litigated every cycle\n2. The five-minute tax: \"can you confirm the interest rate on the facility\" = 30 minutes inside a 150-page PDF, several times a week\n3. Filing entropy: every person has a private mental filing system; documents exist in five places, none of them the one you'd check\n4. AI distribution failure: a good ChatGPT answer on someone's phone has no route to the team — so insight stays personal\n5. Hygiene debt: the fixed-asset register, the triplicate supplier contacts in Xero — perpetually deferred, perpetually corrosive\n\n**Conflicting interests:** The fund wants standardisation; each portfolio CFO wants autonomy and a minimal reporting burden; the principal wants a clean story for investors; everyone wants someone *else* to maintain the template. And the deepest tension: the most valuable data is precisely the data the fund is least willing to feed into any third-party AI.\n\n**What the constellation needs from the AI:** Be the interrogating intermediary the template never had: collect each company's numbers in their own format, *ask the clarifying questions* (\"you told me last month warehousing sat below gross margin — still true?\"), and consolidate into the investor view. Answer the five-minute questions from the document estate with citations. Maintain the hygiene nobody gets to. Distribute insight: an answer found by one person becomes available to the team. All of it inside a security posture a sceptical CFO can defend to himself at 11pm.\n\n## R — Roles\n**Matthew Crane, 49 — Fund CFO (The Defensible Sceptic).** Highgate. Rates his own AI enthusiasm a firm 3/5: dazzled once by a flawless French-CV translation, burned once by half-right cross-border tax advice — and on tax, half-right is worthless, so the specialist gets the call and AI gets a list of better questions to ask them. Uses free Claude for life admin and ChatGPT for work, and tells nobody the real reason he won't connect either to SharePoint: the nagging voice that says *don't put the portfolio numbers in the chatbot*. Win him with provenance, citations, and a deletion policy he can recite.\n**Lily Okeke, 27 — Analyst (The Aligner).** Does the actual consolidation; knows every company's quirks by heart because the quirks live nowhere else. The template's failure is her overtime.\n**Portfolio-side: Nicolas Faure, 52 — CFO of the flagship brand (The Blunt Instrument).** Paris/London. Famously low-EQ emails; privately runs an AI critique of his own drafts \"from the recipient's perspective\" before sending. Resists every reporting change as a tax on his team.\n**Portfolio-side: Emma Lindqvist, 38 — CFO of the 27-person brand (The Stretched).** No digital team, no slack in the week; will comply with any reporting demand that costs under an hour and silently sandbag anything above it.\n\n## E — Edges\nDefining edges: **fund ↔ portfolio CFOs** (influence without authority — the AI must make compliance *cheaper than resistance*, because mandates don't actually work here); **Matthew ↔ his own document estate** (the trust edge: he'll connect the AI to SharePoint the day he believes the answer to \"where does it go?\"); **Matthew ↔ team** (the broadcast edge — personal AI wins need a path to becoming shared knowledge); **fund ↔ portfolio digital talent** (an underused asset edge: the expertise the centre lacks already exists at the periphery).\n\n*Grounded in: Manzanita Capital interview (Matthew J.).*\n"}, {"id": "draft/groundswell/acre-persona.md", "group": "Draft", "name": "ACRE Persona 8 — The Enablement Network", "subtitle": "draft/groundswell", "markdown": "# ACRE Persona 8 — The Enablement Network\n### Groundswell Collective — a 3-person nonprofit equipping grassroots campaign groups\n\n## A — Account\n**Archetype:** The Capacity-Builder. Groundswell, a three-person nonprofit (plus freelancers, plus a new digital campaigner) that supports activists and community groups to run national campaigns — strategy, media, political engagement. Fully remote. Google Workspace (Drive \"a total mess of stuff\"), Slack internally — but the groups they serve live on WhatsApp, so WhatsApp it also is. Notion half-adopted, Canva, Zoom, Calendly: a lot going on, not much of it synced. AI posture: enthusiastic (self-rated 4–5) but early (impact so far: 2/5); two of the team did a six-week AI course and joined its WhatsApp community for ongoing help. House policy, informal but real: *use AI freely, but tell each other*, so checking accounts for it. Tool selection runs through an ethics screen — supplier politics and values genuinely move purchasing decisions — and a budget screen: subscription sprawl is a visible line item in a tight budget. Hardest red line: some of their work involves people recounting trauma; those conversations are never transcribed, full stop, until security is beyond doubt.\n\n## C — Constellation\n**Definition:** A tiny expert hub serving many even-less-resourced external groups — where the \"clients\" are volunteer campaigners, the relationships are the methodology, and the goal is to leave capability *behind* rather than retain dependency.\n\n**Cast:** Director, campaign lead, new digital campaigner, occasional freelancers, the campaign groups themselves (volunteers, WhatsApp-native, hugely varied in capacity), funders (reports, pitches, relationships), the board (quarterly papers).\n\n**Topology:** Hub-and-many-spokes, but with deliberately *outward* knowledge flow: the hub teaches templates and journeys to the spokes and wants the spokes to keep running after the hub steps away. A second, upward edge runs to funders, who supply the money and consume the evidence.\n\n**Boundary objects:** The campaign plan, the supporter-email journey (taught from a template every time), the funder report, the board pack, the impact evidence — qualitative, relational, and chronically hard to quantify.\n\n**Failure modes:**\n1. Knowledge trapped in three heads while the team grows — \"where does someone find stuff?\" has no answer\n2. Every campaign rebuilt semi-from-scratch despite the journeys being 70% standard\n3. Impact going unmeasured because evaluation is the most deferrable task on a tiny team\n4. The reporting treadmill (board, funders) eating one to two days a week of the director's time\n5. Voice erosion: their work *must* sound human and relational; over-AI'd output is mission damage, not just quality damage\n\n**Conflicting interests:** The groups need hand-holding and human warmth; the org needs leverage and standardisation; funders need legible impact numbers from inherently relational work; the ethics screen narrows the tool options the budget screen has already narrowed.\n\n**What the constellation needs from the AI:** Become the organisational memory (\"Notion, but easier\"): weekly priorities surfaced without ceremony, knowledge findable by the new hire. Compress the governance treadmill — board reports and funder reports drafted from accumulated knowledge, not reconstructed each cycle. Productise the templates: a campaigner briefs in their campaign, out comes a six-month email journey *they* own. Help quantify qualitative impact. Respect the bright lines absolutely: trauma-adjacent material untouched, the human voice preserved, the values screen passed.\n\n## R — Roles\n**Ruth Calder-Jones, 45 — Director (The Relational Engine).** Sheffield, works from the kitchen table with a dramatic dog. Talks her thinking out loud — uses dictation software constantly, \"blurts\" at ChatGPT and asks it to organise her back. Drafts awkward funder emails with AI and rewrites them to sound like herself; would never send anything unchecked (\"never the last draft\"). Did the AI course, thrived for three weeks, got lost in week four — her ceiling isn't curiosity, it's the absence of anyone in-house to ask.\n**Maya Osei, 29 — Digital Campaigner (The New Capacity).** Joining from a charity that *banned* AI outright — where, she reports, everyone simply used it in secret. Carries both digital fluency and a sharp sense of how trust breaks when tools are imposed.\n**Group-side: Donna Pryor, 52 — Volunteer Campaign Lead (The Spoke That Stays).** Runs a health-justice campaign evenings and weekends from WhatsApp and a shared Gmail. Any tool left with her must work on a phone, cost nothing, and never make her supporters feel processed.\n**Funder-side: programme officer at a foundation.** Sympathetic, deadline-bound, numbers-hungry.\n\n## E — Edges\nDefining edges: **org ↔ campaign groups** (the sacred edge: high-trust, WhatsApp-native, and it must never feel automated — AI works *behind* this edge, preparing what the humans then deliver warmly); **org ↔ funders** (formal, cyclical, evidence-hungry — the highest-leverage edge to automate); **Ruth ↔ the team's AI use** (the transparency edge: \"tell each other\" as policy is a product feature waiting to exist); **org ↔ its own future staff** (the knowledge edge: everything currently in heads must land somewhere a new hire can find).\n\n*Grounded in: Breakthrough Impact interview (Kat S.).*\n"}];

function slugify(s) {
  return s.toLowerCase().replace(/[^\w]+/g, "-").replace(/^-+|-+$/g, "");
}

function renderMarkdown(md) {
  if (window.marked) {
    return marked.parse(md, { gfm: true, breaks: false });
  }
  document.getElementById("offline").style.display = "block";
  const pre = document.createElement("pre");
  pre.textContent = md;
  return pre.outerHTML;
}

function buildNav() {
  const nav = document.getElementById("nav");
  const groups = {};
  DOCS.forEach((d, i) => {
    (groups[d.group] = groups[d.group] || []).push({ ...d, index: i });
  });
  nav.innerHTML = "";
  Object.keys(groups).forEach(group => {
    const g = document.createElement("div");
    g.className = "nav-group";
    g.innerHTML = `<div class="label">${group}</div>`;
    groups[group].forEach(d => {
      const item = document.createElement("a");
      item.className = "nav-item";
      item.dataset.id = d.id;
      item.innerHTML = `<div class="title">${d.name}</div><div class="sub">${d.subtitle}</div>`;
      item.onclick = (e) => { e.preventDefault(); selectDoc(d.id); };
      g.appendChild(item);
    });
    nav.appendChild(g);
  });
}

function selectDoc(id) {
  const doc = DOCS.find(d => d.id === id) || DOCS[0];
  document.querySelectorAll(".nav-item").forEach(n =>
    n.classList.toggle("active", n.dataset.id === doc.id));

  const target = document.getElementById("doc");
  target.innerHTML = renderMarkdown(doc.markdown);

  // Give headings ids + anchors, and build the table of contents.
  const toc = document.getElementById("toc");
  const heads = target.querySelectorAll("h2, h3");
  if (heads.length) {
    let tocHtml = '<div class="label">On this page</div>';
    const seen = {};
    heads.forEach(h => {
      let base = slugify(h.textContent) || "section";
      seen[base] = (seen[base] || 0) + 1;
      const hid = seen[base] > 1 ? `${base}-${seen[base]}` : base;
      h.id = hid;
      h.insertAdjacentHTML("beforeend", `<a class="anchor" href="#${hid}">#</a>`);
      tocHtml += `<a class="${h.tagName.toLowerCase()}" href="#${hid}" data-target="${hid}">${h.firstChild.textContent}</a>`;
    });
    toc.innerHTML = tocHtml;
    toc.style.display = "block";
    wireTocLinks();
  } else {
    toc.innerHTML = "";
    toc.style.display = "none";
  }

  history.replaceState(null, "", "#" + encodeURIComponent(doc.id));
  document.querySelector(".main").scrollTo(0, 0);
}

function wireTocLinks() {
  document.querySelectorAll(".toc a[data-target]").forEach(a => {
    a.onclick = (e) => {
      e.preventDefault();
      const el = document.getElementById(a.dataset.target);
      if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    };
  });
}

// Highlight the current section in the TOC while scrolling.
document.querySelector(".main").addEventListener("scroll", () => {
  const heads = [...document.querySelectorAll("#doc h2, #doc h3")];
  let current = null;
  for (const h of heads) {
    if (h.getBoundingClientRect().top < 120) current = h.id; else break;
  }
  document.querySelectorAll(".toc a[data-target]").forEach(a =>
    a.classList.toggle("active", a.dataset.target === current));
});

buildNav();
const initial = decodeURIComponent((location.hash || "").slice(1));
selectDoc(DOCS.find(d => d.id === initial) ? initial : (DOCS[0] && DOCS[0].id));
</script>
